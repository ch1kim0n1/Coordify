<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="280" fill="#0C0E12"/>

  <!-- Header -->
  <text x="80" y="28"
    font-family="ui-monospace,'SF Mono','Cascadia Code','Consolas',monospace"
    font-size="9" letter-spacing="2" fill="#6B7590">HEAT HISTORY · AGENT-A ↔ AGENT-B · 2026-06-22_14:00–15:00</text>

  <!--
    Chart area: x=80 to x=1080, y=44 to y=216
    Width = 1000,  Height = 172

    Y: 0% → y=216   100% → y=44
    Scale: 172px per 100%, so 1% = 1.72px
    y(heat%) = 216 - (heat/100)*172

    X: 14:00=80, 15:00=1080 → 1000px / 60min → 16.667px/min
    x(min_offset) = 80 + min_offset * 16.667

    Band boundaries in y:
      0%  → 216
      25% → 216 - 43 = 173
      50% → 216 - 86 = 130
      75% → 216 - 129 = 87
      100%→ 44

    Data points:
      14:00 (0min)  → x=80,   heat=12% → y=216-20.6=195
      14:15 (15min) → x=330,  heat=29% → y=216-49.9=166
      14:30 (30min) → x=580,  heat=61% → y=216-104.9=111
      14:38 (38min) → x=713,  heat=84% → y=216-144.5=72
      14:45 (45min) → x=830,  heat=42% → y=216-72.2=144
      15:00 (60min) → x=1080, heat=18% → y=216-31.0=185
  -->

  <!-- ── Band fills ── -->
  <!-- SAFE 0-25%: y=173 to y=216 -->
  <rect x="80" y="173" width="1000" height="43" fill="#00B8A9" opacity="0.05"/>
  <!-- MONITOR 26-50%: y=130 to y=173 -->
  <rect x="80" y="130" width="1000" height="43" fill="#F8C41A" opacity="0.05"/>
  <!-- OVERLAP 51-75%: y=87 to y=130 -->
  <rect x="80" y="87" width="1000" height="43" fill="#FF7043" opacity="0.06"/>
  <!-- CONFLICT 76-100%: y=44 to y=87 -->
  <rect x="80" y="44" width="1000" height="43" fill="#E53935" opacity="0.06"/>

  <!-- ── Grid lines ── -->
  <line x1="80" y1="173" x2="1080" y2="173" stroke="#252A35" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="130" x2="1080" y2="130" stroke="#252A35" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="87"  x2="1080" y2="87"  stroke="#252A35" stroke-width="0.5" opacity="0.5"/>

  <!-- ── Axes ── -->
  <line x1="80" y1="44"  x2="80"   y2="216" stroke="#252A35" stroke-width="1"/>
  <line x1="80" y1="216" x2="1080" y2="216" stroke="#252A35" stroke-width="1"/>

  <!-- ── Y-axis labels ── -->
  <text x="70" y="219" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">0%</text>
  <text x="70" y="176" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#00B8A9">25%</text>
  <text x="70" y="133" text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#F8C41A">50%</text>
  <text x="70" y="90"  text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#FF7043">75%</text>
  <text x="70" y="48"  text-anchor="end" font-family="ui-monospace,monospace" font-size="9" fill="#E53935">100%</text>

  <!-- ── X-axis time labels ── -->
  <text x="80"   y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">14:00</text>
  <text x="330"  y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">14:15</text>
  <text x="580"  y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">14:30</text>
  <text x="713"  y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">14:38</text>
  <text x="830"  y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">14:45</text>
  <text x="1080" y="230" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#6B7590">15:00</text>

  <!-- ── Area fill ── -->
  <polygon
    points="80,216 80,195 330,166 580,111 713,72 830,144 1080,185 1080,216"
    fill="#E8EDF5" opacity="0.03"/>

  <!-- ── Heat line ── -->
  <polyline
    points="80,195 330,166 580,111 713,72 830,144 1080,185"
    fill="none" stroke="#E8EDF5" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Data point dots ── -->
  <circle cx="80"   cy="195" r="3.5" fill="#00B8A9" stroke="#0C0E12" stroke-width="1"/>
  <circle cx="330"  cy="166" r="3.5" fill="#F8C41A" stroke="#0C0E12" stroke-width="1"/>
  <circle cx="580"  cy="111" r="3.5" fill="#FF7043" stroke="#0C0E12" stroke-width="1"/>
  <circle cx="713"  cy="72"  r="5"   fill="#E53935" stroke="#0C0E12" stroke-width="1.5"/>
  <circle cx="830"  cy="144" r="3.5" fill="#F8C41A" stroke="#0C0E12" stroke-width="1"/>
  <circle cx="1080" cy="185" r="3.5" fill="#00B8A9" stroke="#0C0E12" stroke-width="1"/>

  <!-- ── Event markers ── -->

  <!-- CLAIM_CREATED at x=330 -->
  <line x1="330" y1="160" x2="330" y2="55" stroke="#F8C41A" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <rect x="335" y="52" width="10" height="10" rx="2" fill="#F8C41A" opacity="0.8"/>
  <text x="350" y="61" font-family="ui-monospace,monospace" font-size="8" fill="#F8C41A">CLAIM_CREATED</text>
  <text x="350" y="72" font-family="ui-monospace,monospace" font-size="8" fill="#6B7590">agent-b → AUTHENTICATION</text>

  <!-- THRESHOLD_EXCEEDED near x=640 (when it crosses 76%) -->
  <!-- At heat=76%, y=216-(76/100)*172=216-130.7=85.3≈85, x≈640 interpolating 580,111 to 713,72 -->
  <!-- heat goes from 61% at x=580 to 84% at x=713. At 76%: fraction=(76-61)/(84-61)=15/23=0.652, x=580+0.652*133=667, y=111-(0.652)*(111-72)=111-25.4=86 -->
  <line x1="667" y1="86" x2="667" y2="240" stroke="#E53935" stroke-width="1" stroke-dasharray="2,3" opacity="0.4"/>

  <!-- NEGOTIATING at x=713 (peak) -->
  <line x1="713" y1="66" x2="713" y2="250" stroke="#E53935" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <!-- Peak label -->
  <rect x="672" y="50" width="82" height="18" rx="3" fill="#E53935" opacity="0.15" stroke="#E53935" stroke-width="0.8"/>
  <text x="713" y="63" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#E53935">84% CONFLICT</text>
  <!-- Event label below -->
  <text x="715" y="244" font-family="ui-monospace,monospace" font-size="8" fill="#E53935">NEGOTIATING</text>

  <!-- CONFLICT_RESOLVED at x=830 -->
  <line x1="830" y1="138" x2="830" y2="55" stroke="#00B8A9" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <rect x="835" y="52" width="10" height="10" rx="2" fill="#00B8A9" opacity="0.8"/>
  <text x="850" y="61" font-family="ui-monospace,monospace" font-size="8" fill="#00B8A9">CONFLICT_RESOLVED</text>
  <text x="850" y="72" font-family="ui-monospace,monospace" font-size="8" fill="#6B7590">scope split · SPLIT_SCOPE accepted</text>

  <!-- ── Band labels on right ── -->
  <text x="1088" y="219" font-family="ui-monospace,monospace" font-size="8" fill="#00B8A9">SAFE</text>
  <text x="1088" y="176" font-family="ui-monospace,monospace" font-size="8" fill="#F8C41A">MONITOR</text>
  <text x="1088" y="133" font-family="ui-monospace,monospace" font-size="8" fill="#FF7043">OVERLAP</text>
  <text x="1088" y="90"  font-family="ui-monospace,monospace" font-size="8" fill="#E53935">CONFLICT</text>

  <!-- ── Footer ── -->
  <text x="80" y="260"
    font-family="ui-monospace,monospace"
    font-size="8" fill="#252A35">heat-history.json · session 2026-06-22_14:00 · generated by Coordify Core</text>

</svg>
