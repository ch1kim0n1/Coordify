name: CI

on:
  push:
    branches: [main]
  pull_request:

# Coordify Core (Rust) lives in packages/coordify-core. This job lints, tests,
# and enforces a line-coverage floor so coverage cannot silently rot as the
# codebase grows (Phases 2-6). Raise --fail-under-lines as coverage improves;
# current floor is well below the measured ~96%.
jobs:
  coordify-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/coordify-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/coordify-core/Cargo.lock') }}

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests + coverage gate
        run: cargo llvm-cov --fail-under-lines 90 -- --test-threads=4

  coordify-hook:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-hook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-hook/package-lock.json
      - run: npm ci
      - name: Unit tests (skip integration — no Core binary on CI)
        run: node --test test/mapping.test.js test/install.test.js test/core-client.test.js

  coordify-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  coordify-sim:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-sim/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
