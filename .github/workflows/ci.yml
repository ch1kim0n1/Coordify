name: CI

on:
  push:
    branches: [main]
  pull_request:

# Coordify Core (Rust) lives in packages/coordify-core. This job lints, tests,
# and enforces a line-coverage floor so coverage cannot silently rot as the
# codebase grows (Phases 2-6). Raise --fail-under-lines as coverage improves;
# current floor is well below the measured ~96%.
#
# Matrix is ubuntu-only on purpose: macOS Actions minutes are paid even for
# public repos, and Coordify 0.1.0 is Unix-only (macOS + Linux) with no
# Windows support. macOS verification is done manually on a dev machine before
# each release (see RELEASE.md).
jobs:
  coordify-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/coordify-core/target
          key: ubuntu-cargo-${{ hashFiles('packages/coordify-core/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests + coverage gate
        run: cargo llvm-cov --fail-under-lines 90 -- --test-threads=4

  # Separate audit job so a new advisory does not get masked by a build failure.
  cargo-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: cargo audit (advisories)
        run: cargo audit --deny warnings
      - name: cargo deny (advisories + licenses + bans)
        run: cargo deny check

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: coordify-cli audit
        working-directory: packages/coordify-cli
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: coordify-sim audit
        working-directory: packages/coordify-sim
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
      - name: coordify-hook audit
        working-directory: packages/coordify-hook
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  coordify-hook:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-hook
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-hook/package-lock.json
      - run: npm ci
      - name: Unit tests (skip integration — no Core binary on CI)
        run: node --test test/mapping.test.js test/install.test.js test/core-client.test.js

  coordify-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  coordify-sim:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/coordify-sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/coordify-sim/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
