# cargo-deny configuration for coordify-core.
# Run: cargo deny check
# CI runs this on every push/PR (see .github/workflows/ci.yml).

[advisories]
# Deny yanked crates so a stale lockfile cannot ship a pulled version.
# vulnerability/notice/unmaintained severity keys removed in cargo-deny 0.15
# (see https://github.com/EmbarkStudios/cargo-deny/pull/611).
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "deny"

[licenses]
# Coordify is MIT. Allow only permissive licenses in the dependency graph —
# no GPL/AGPL/copyleft can sneak in via a transitive dep.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# No duplicate versions of the same crate allowed (catches dependency
# conflicts early). Known transitive duplicates can be added to `skip` if
# unavoidable.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
# Only allow crates from crates.io. No private/git registries.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
