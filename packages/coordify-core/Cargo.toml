[package]
name = "coordify-core"
version = "0.1.0"
edition = "2021"
description = "Multi-agent coordination daemon for Claude Code — CAP protocol over Unix sockets"
license = "MIT"
repository = "https://github.com/ch1kim0n1/Coordify"
homepage = "https://github.com/ch1kim0n1/Coordify"
keywords = ["claude", "ai", "coordination", "multi-agent"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "coordify_core"
path = "src/lib.rs"

[[bin]]
name = "coordify-core"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
